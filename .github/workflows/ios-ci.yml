name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Linting
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install SwiftLint
        run: brew install swiftlint
        
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  test:
    name: Test Coverage
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project NeuraLink.xcodeproj \
            -scheme NeuraLink \
            -destination 'platform=iOS Simulator,name=iPhone 16e' \
            -derivedDataPath ./build-ci \
            CODE_SIGNING_ALLOWED=NO

      - name: Pre-boot Simulator
        run: |
          # Ensure a clean slate
          xcrun simctl shutdown all || true
          xcrun simctl erase "iPhone 16e" || true
          xcrun simctl boot "iPhone 16e" || true
          xcrun simctl bootstatus "iPhone 16e" -b

      - name: Test Without Building
        run: |
          xcodebuild test-without-building \
            -project NeuraLink.xcodeproj \
            -scheme NeuraLink \
            -destination 'platform=iOS Simulator,name=iPhone 16e' \
            -derivedDataPath ./build-ci \
            -parallel-testing-enabled NO \
            -retry-tests-on-failure \
            CODE_SIGNING_ALLOWED=NO
